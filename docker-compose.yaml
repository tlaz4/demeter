services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - 7233:7233
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    container_name: api
    volumes:
      - demeter_data:/data
    ports:
      - 8000:8000
    environment:
      - TEMPORAL_HOST=temporal:7233
      - SOLAR_DB_PATH=/data/demeter.db
    depends_on:
      - temporal
    restart: on-failure

  worker:
    build: .
    container_name: worker
    working_dir: /app/demeter
    command: python run_worker.py
    volumes:
      - demeter_data:/data
    environment:
      - TEMPORAL_HOST=temporal:7233
      - SOLAR_DB_PATH=/data/demeter.db
    depends_on:
      - temporal
    restart: on-failure

volumes:
  postgres_data:
  demeter_data:
